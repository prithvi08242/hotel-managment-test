name: Deploy Dashboard

on:
  push:
    branches: [feature/ci]
    paths:
      - "pipeline-flow.html"

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare pages folder
        run: |
          mkdir -p _site
          cp pipeline-flow.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4